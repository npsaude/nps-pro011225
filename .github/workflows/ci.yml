name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # Gate estrito (noImplicitAny + noUnusedLocals + noUnusedParameters)
      # sobre todo o src. Bloqueante: impede regressão de código morto /
      # any implícito introduzidos a partir daqui.
      - name: Typecheck (strict)
        run: pnpm typecheck:strict

      - name: Test
        run: pnpm test:run

      - name: Build
        run: pnpm build

      # Lint bloqueante: zero erros. O débito de `no-explicit-any` (~214) é
      # rebaixado a warning no eslint.config.js e tratado por etapas; as edge
      # functions Deno ficam fora do escopo do lint do frontend.
      - name: Lint
        run: pnpm lint
