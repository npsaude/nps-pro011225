<!doctype html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      A interface é toda em português. Declarar o idioma correto e desativar a
      tradução automática evita que o Chrome (em navegadores configurados em
      outro idioma) reescreva os nós de texto da DOM. Quando o tradutor troca
      esses nós, o React quebra ao atualizá-los com erros do tipo
      "NotFoundError: Failed to execute 'insertBefore' on 'Node'", deixando a
      tela preta — especialmente em telas com muito texto dinâmico, como o
      envio de guias em lote.
    -->
    <meta name="google" content="notranslate" />
    <title>CONMEDIC</title>
    <link
      rel="icon"
      type="image/png"
      href="https://pokyribuibmbeorrcsgk.supabase.co/storage/v1/object/sign/NPS-pro/site/logo-conmagic-favicon.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9kZDc4YzM5NC1hMTFlLTQ3MTEtYTVmNi1lMjU4ZGU4MGRiYzgiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJOUFMtcHJvL3NpdGUvbG9nby1jb25tYWdpYy1mYXZpY29uLnBuZyIsImlhdCI6MTc3MTAwMjQxMywiZXhwIjoyNDAxNzIyNDEzfQ.EFdbCwJ0scnjf4oFCJRg5YA_JtHfA2LZf_gugIB4WcY"
    />

    <!--
      Redirecionamento síncrono para /reset-password quando o Supabase
      envia tokens de recovery no hash (ex.: #access_token=...&type=recovery).
      Precisa rodar ANTES de qualquer JS assíncrono ou do Supabase client.
    -->
    <script>
      (function () {
        try {
          var path = window.location.pathname;
          var hash = window.location.hash || "";
          var search = window.location.search || "";

          // Já está em /reset-password? Não faz nada.
          if (path === "/reset-password") return;

          // Checa hash (implicit flow)
          if (hash && hash.length > 1) {
            var raw = hash.charAt(0) === "#" ? hash.slice(1) : hash;
            var params = new URLSearchParams(raw);
            if (params.get("type") === "recovery") {
              window.location.replace("/reset-password" + search + hash);
              return;
            }
          }

          // Checa query string (PKCE / OTP)
          if (search) {
            var qp = new URLSearchParams(search);
            if (qp.get("type") === "recovery") {
              window.location.replace("/reset-password" + search + hash);
              return;
            }
          }
        } catch (e) {
          // silencia erros para não travar a página
        }
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
